name: Feature Branch Pipeline (Firebase Hosting)

on:
  push:
    branches:
      - '**'
      - '!main'

# Only allow one pipeline per branch at a time
concurrency:
  group: push-feature-${{ github.ref }}
  cancel-in-progress: true

env:
  GCP_PROJECT_ID: chalanding
  GCP_REGION: us-central1

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  # ==================== Step 1: Local Tests ====================
  local-tests:
    name: Local Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      fellspiral-changed: ${{ steps.check-changes.outputs.fellspiral-changed }}
      videobrowser-changed: ${{ steps.check-changes.outputs.videobrowser-changed }}
      audiobrowser-changed: ${{ steps.check-changes.outputs.audiobrowser-changed }}
      mediasync-changed: ${{ steps.check-changes.outputs.mediasync-changed }}
      playwright-server-changed: ${{ steps.check-changes.outputs.playwright-server-changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check for changes
        id: check-changes
        run: |
          # Check fellspiral changes
          if git diff --name-only HEAD^ HEAD | grep -qE "^(fellspiral/|shared/auth/)"; then
            echo "fellspiral-changed=true" >> $GITHUB_OUTPUT
            echo "✅ Fellspiral changed"
          else
            echo "fellspiral-changed=false" >> $GITHUB_OUTPUT
            echo "⏸️  Fellspiral unchanged"
          fi

          # Check videobrowser changes
          if git diff --name-only HEAD^ HEAD | grep -qE "^(videobrowser/|shared/auth/)"; then
            echo "videobrowser-changed=true" >> $GITHUB_OUTPUT
            echo "✅ Videobrowser changed"
          else
            echo "videobrowser-changed=false" >> $GITHUB_OUTPUT
            echo "⏸️  Videobrowser unchanged"
          fi

          # Check audiobrowser changes
          if git diff --name-only HEAD^ HEAD | grep -qE "^(audiobrowser/|shared/auth/)"; then
            echo "audiobrowser-changed=true" >> $GITHUB_OUTPUT
            echo "✅ Audiobrowser changed"
          else
            echo "audiobrowser-changed=false" >> $GITHUB_OUTPUT
            echo "⏸️  Audiobrowser unchanged"
          fi

          # Check mediasync changes
          if git diff --name-only HEAD^ HEAD | grep -q "^mediasync/\|^gcsupload/\|^shared-components/upload/"; then
            echo "mediasync-changed=true" >> $GITHUB_OUTPUT
            echo "✅ MediaSync changed"
          else
            echo "mediasync-changed=false" >> $GITHUB_OUTPUT
            echo "⏸️  MediaSync unchanged"
          fi

          # Check playwright-server changes
          if git diff --name-only HEAD^ HEAD | grep -q "^playwright-server/"; then
            echo "playwright-server-changed=true" >> $GITHUB_OUTPUT
            echo "✅ Playwright server changed"
          else
            echo "playwright-server-changed=false" >> $GITHUB_OUTPUT
            echo "⏸️  Playwright server unchanged"
          fi

      - name: Test Fellspiral
        if: steps.check-changes.outputs.fellspiral-changed == 'true'
        run: ./infrastructure/scripts/run-local-tests.sh fellspiral

      - name: Test Videobrowser
        if: steps.check-changes.outputs.videobrowser-changed == 'true'
        run: ./infrastructure/scripts/run-local-tests.sh videobrowser

      - name: Test Audiobrowser
        if: steps.check-changes.outputs.audiobrowser-changed == 'true'
        run: ./infrastructure/scripts/run-local-tests.sh audiobrowser

      - name: Test MediaSync
        if: steps.check-changes.outputs.mediasync-changed == 'true'
        run: ./infrastructure/scripts/run-local-tests.sh mediasync

  # ==================== Step 2: Deploy Playwright Server (if changed) ====================
  deploy-playwright-server:
    name: Deploy Playwright Server
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: local-tests
    if: needs.local-tests.outputs.playwright-server-changed == 'true'
    outputs:
      playwright-url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Deploy Playwright Server
        run: ./infrastructure/scripts/deploy-playwright-server.sh ${{ github.sha }}

      - name: Get service URL
        id: get-url
        run: |
          URL=$(cat /tmp/playwright-server-url.txt)
          echo "url=${URL}" >> $GITHUB_OUTPUT

  # ==================== Step 3: Deploy Sites to Firebase Hosting ====================
  deploy-fellspiral:
    name: Deploy Fellspiral (Preview)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: local-tests
    if: needs.local-tests.outputs.fellspiral-changed == 'true'
    outputs:
      service-url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting Preview
        id: deploy
        run: |
          ./infrastructure/scripts/deploy-firebase-hosting.sh fellspiral ${{ github.ref_name }} ${{ github.sha }}
          URL=$(cat /tmp/deployment-url.txt)
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Deployed to: ${URL}"

  deploy-videobrowser:
    name: Deploy Videobrowser (Preview)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: local-tests
    if: needs.local-tests.outputs.videobrowser-changed == 'true'
    outputs:
      service-url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting Preview
        id: deploy
        run: |
          ./infrastructure/scripts/deploy-firebase-hosting.sh videobrowser ${{ github.ref_name }} ${{ github.sha }}
          URL=$(cat /tmp/deployment-url.txt)
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Deployed to: ${URL}"

  deploy-audiobrowser:
    name: Deploy Audiobrowser (Preview)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: local-tests
    if: needs.local-tests.outputs.audiobrowser-changed == 'true'
    outputs:
      service-url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting Preview
        id: deploy
        run: |
          ./infrastructure/scripts/deploy-firebase-hosting.sh audiobrowser ${{ github.ref_name }} ${{ github.sha }}
          URL=$(cat /tmp/deployment-url.txt)
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Deployed to: ${URL}"

  deploy-mediasync:
    name: Deploy MediaSync
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: local-tests
    if: needs.local-tests.outputs.mediasync-changed == 'true'
    outputs:
      service-url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          set -e
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/commons-systems/mediasync:${{ github.sha }}"

          echo "Building Docker image: ${IMAGE_NAME}"
          docker build -t "${IMAGE_NAME}" -f mediasync/Dockerfile .

          echo "Pushing Docker image to Artifact Registry"
          docker push "${IMAGE_NAME}"

          echo "Image pushed successfully: ${IMAGE_NAME}"

      - name: Deploy to Cloud Run
        run: |
          set -e
          SERVICE_NAME="mediasync-site"
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/commons-systems/mediasync:${{ github.sha }}"

          # Determine revision suffix for feature branch
          BRANCH_NAME=$(echo "${{ github.ref_name }}" | sed 's/[^a-z0-9-]/-/g' | cut -c1-20)
          REVISION_SUFFIX="${BRANCH_NAME}-${{ github.sha }}"

          echo "Deploying ${SERVICE_NAME} with revision suffix: ${REVISION_SUFFIX}"

          gcloud run deploy "${SERVICE_NAME}" \
            --image="${IMAGE_NAME}" \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --max-instances=10 \
            --set-env-vars="GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCS_BUCKET=rml-media" \
            --revision-suffix="${REVISION_SUFFIX:0:50}" \
            --tag="${{ github.ref_name }}"

          # Get service URL
          URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --platform=managed \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')

          echo "${URL}" > /tmp/deployment-url.txt
          echo "Deployed to: ${URL}"

      - name: Get service URL
        id: get-url
        run: |
          URL=$(cat /tmp/deployment-url.txt)
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Wait for service to be ready
        run: ./infrastructure/scripts/health-check.sh "${{ steps.get-url.outputs.url }}/health" 60 5

  # ==================== Step 4: E2E Tests ====================
  playwright-tests-fellspiral:
    name: E2E Tests - Fellspiral
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-fellspiral, deploy-playwright-server]
    if: |
      always() &&
      needs.deploy-fellspiral.result == 'success' &&
      (needs.deploy-playwright-server.result == 'success' || needs.deploy-playwright-server.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Playwright server URL
        id: get-playwright-url
        run: |
          if [ "${{ needs.deploy-playwright-server.result }}" = "success" ]; then
            URL="${{ needs.deploy-playwright-server.outputs.playwright-url }}"
          else
            URL=$(gcloud run services describe playwright-server \
              --region=${{ env.GCP_REGION }} \
              --format='value(status.url)')
          fi
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Run Playwright tests
        run: ./infrastructure/scripts/run-playwright-tests.sh fellspiral "${{ needs.deploy-fellspiral.outputs.service-url }}" "${{ steps.get-playwright-url.outputs.url }}"
        env:
          PLAYWRIGHT_SERVER_URL: ${{ steps.get-playwright-url.outputs.url }}
          DEPLOYED_URL: ${{ needs.deploy-fellspiral.outputs.service-url }}
          CI: true

  playwright-tests-videobrowser:
    name: E2E Tests - Videobrowser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-videobrowser, deploy-playwright-server]
    if: |
      always() &&
      needs.deploy-videobrowser.result == 'success' &&
      (needs.deploy-playwright-server.result == 'success' || needs.deploy-playwright-server.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Playwright server URL
        id: get-playwright-url
        run: |
          if [ "${{ needs.deploy-playwright-server.result }}" = "success" ]; then
            URL="${{ needs.deploy-playwright-server.outputs.playwright-url }}"
          else
            URL=$(gcloud run services describe playwright-server \
              --region=${{ env.GCP_REGION }} \
              --format='value(status.url)')
          fi
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Run Playwright tests
        run: ./infrastructure/scripts/run-playwright-tests.sh videobrowser "${{ needs.deploy-videobrowser.outputs.service-url }}" "${{ steps.get-playwright-url.outputs.url }}"
        env:
          PLAYWRIGHT_SERVER_URL: ${{ steps.get-playwright-url.outputs.url }}
          DEPLOYED_URL: ${{ needs.deploy-videobrowser.outputs.service-url }}
          CI: true

  playwright-tests-audiobrowser:
    name: E2E Tests - Audiobrowser
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-audiobrowser, deploy-playwright-server]
    if: |
      always() &&
      needs.deploy-audiobrowser.result == 'success' &&
      (needs.deploy-playwright-server.result == 'success' || needs.deploy-playwright-server.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Playwright server URL
        id: get-playwright-url
        run: |
          if [ "${{ needs.deploy-playwright-server.result }}" = "success" ]; then
            URL="${{ needs.deploy-playwright-server.outputs.playwright-url }}"
          else
            URL=$(gcloud run services describe playwright-server \
              --region=${{ env.GCP_REGION }} \
              --format='value(status.url)')
          fi
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Run Playwright tests
        run: ./infrastructure/scripts/run-playwright-tests.sh audiobrowser "${{ needs.deploy-audiobrowser.outputs.service-url }}" "${{ steps.get-playwright-url.outputs.url }}"
        env:
          PLAYWRIGHT_SERVER_URL: ${{ steps.get-playwright-url.outputs.url }}
          DEPLOYED_URL: ${{ needs.deploy-audiobrowser.outputs.service-url }}
          CI: true

  playwright-tests-mediasync:
    name: E2E Tests - MediaSync
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-mediasync, deploy-playwright-server]
    if: |
      always() &&
      needs.deploy-mediasync.result == 'success' &&
      (needs.deploy-playwright-server.result == 'success' || needs.deploy-playwright-server.result == 'skipped')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Playwright server URL
        id: get-playwright-url
        run: |
          if [ "${{ needs.deploy-playwright-server.result }}" = "success" ]; then
            URL="${{ needs.deploy-playwright-server.outputs.playwright-url }}"
          else
            URL=$(gcloud run services describe playwright-server \
              --region=${{ env.GCP_REGION }} \
              --format='value(status.url)')
          fi
          echo "url=${URL}" >> $GITHUB_OUTPUT

      - name: Run Playwright tests
        run: ./infrastructure/scripts/run-playwright-tests.sh mediasync "${{ needs.deploy-mediasync.outputs.service-url }}" "${{ steps.get-playwright-url.outputs.url }}"
        env:
          PLAYWRIGHT_SERVER_URL: ${{ steps.get-playwright-url.outputs.url }}
          DEPLOYED_URL: ${{ needs.deploy-mediasync.outputs.service-url }}
          CI: true

  # ==================== Summary ====================
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [local-tests, deploy-fellspiral, deploy-videobrowser, deploy-audiobrowser, deploy-mediasync, playwright-tests-fellspiral, playwright-tests-videobrowser, playwright-tests-audiobrowser, playwright-tests-mediasync]
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "# 🚀 Feature Branch Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployments" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.deploy-fellspiral.result }}" = "success" ]; then
            echo "- ✅ **Fellspiral** (Firebase Hosting): ${{ needs.deploy-fellspiral.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-videobrowser.result }}" = "success" ]; then
            echo "- ✅ **Videobrowser** (Firebase Hosting): ${{ needs.deploy-videobrowser.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-audiobrowser.result }}" = "success" ]; then
            echo "- ✅ **Audiobrowser** (Firebase Hosting): ${{ needs.deploy-audiobrowser.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.deploy-mediasync.result }}" = "success" ]; then
            echo "- ✅ **MediaSync** (Cloud Run): ${{ needs.deploy-mediasync.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Local Tests: ${{ needs.local-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Fellspiral E2E: ${{ needs.playwright-tests-fellspiral.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Videobrowser E2E: ${{ needs.playwright-tests-videobrowser.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Audiobrowser E2E: ${{ needs.playwright-tests-audiobrowser.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- MediaSync E2E: ${{ needs.playwright-tests-mediasync.result }}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔥 **Firebase Hosting**: Preview deployments with automatic auth authorization (7-day expiration)" >> $GITHUB_STEP_SUMMARY
          echo "☁️ **Cloud Run**: MediaSync backend service" >> $GITHUB_STEP_SUMMARY
