name: Manual Deploy - Audioupload

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
        type: string
      skip_tests:
        description: 'Skip tests (use with caution)'
        required: false
        default: false
        type: boolean

env:
  GCP_PROJECT_ID: chalanding
  GCP_REGION: us-central1
  SITE_NAME: audioupload

permissions:
  contents: write
  id-token: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  # ==================== Step 1: Local Tests ====================
  local-tests:
    name: Run Local Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run local tests
        run: ./infrastructure/scripts/run-local-tests.sh ${{ env.SITE_NAME }}

  # ==================== Step 2: Deploy Site ====================
  deploy:
    name: Deploy Audioupload
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: local-tests
    if: ${{ always() && (needs.local-tests.result == 'success' || needs.local-tests.result == 'skipped') }}
    outputs:
      service-url: ${{ steps.get-url.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and deploy Audioupload
        run: |
          # Build the Docker image with backend and frontend
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/commons-systems/${{ env.SITE_NAME }}"
          IMAGE_TAG="${{ inputs.branch }}-${{ github.sha }}"

          docker buildx build \
            --platform linux/amd64 \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            -t "${IMAGE_NAME}:${IMAGE_TAG}" \
            -t "${IMAGE_NAME}:${{ inputs.branch }}-latest" \
            -f audioupload/Dockerfile \
            --push \
            .

          # Deploy to Cloud Run
          SERVICE_NAME="${{ env.SITE_NAME }}"
          if [ "${{ inputs.branch }}" != "main" ]; then
            SERVICE_NAME="${{ env.SITE_NAME }}-$(echo ${{ inputs.branch }} | sed 's/[^a-z0-9-]/-/g' | cut -c1-63)"
          fi

          gcloud run deploy "${SERVICE_NAME}" \
            --image "${IMAGE_NAME}:${IMAGE_TAG}" \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --allow-unauthenticated \
            --set-env-vars "GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},GCS_BUCKET=rml-media" \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --max-instances 10 \
            --min-instances 0

          # Get service URL
          URL=$(gcloud run services describe "${SERVICE_NAME}" \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')

          echo "${URL}" > /tmp/deployment-url.txt
          echo "Deployed to: ${URL}"

      - name: Get service URL
        id: get-url
        run: |
          URL=$(cat /tmp/deployment-url.txt)
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Deployed to: ${URL}"

      - name: Wait for service to be ready
        run: ./infrastructure/scripts/health-check.sh "${{ steps.get-url.outputs.url }}/health" 60 5

  # ==================== Step 3: Playwright Tests ====================
  playwright-tests:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: deploy
    if: ${{ !inputs.skip_tests }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Playwright server URL
        id: playwright-server
        run: |
          URL=$(gcloud run services describe playwright-server \
            --platform managed \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "url=${URL}" >> $GITHUB_OUTPUT
          echo "Playwright Server URL: ${URL}"

      - name: Run Playwright tests
        run: ./infrastructure/scripts/run-playwright-tests.sh ${{ env.SITE_NAME }} "${{ needs.deploy.outputs.service-url }}" "${{ steps.playwright-server.outputs.url }}"
        env:
          PLAYWRIGHT_SERVER_URL: ${{ steps.playwright-server.outputs.url }}
          DEPLOYED_URL: ${{ needs.deploy.outputs.service-url }}
          CI: true

  # ==================== Summary ====================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [local-tests, deploy, playwright-tests]
    if: always()

    steps:
      - name: Create summary
        run: |
          echo "# 🚀 Manual Deployment Summary - Audioupload" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ inputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Local Tests: ${{ needs.local-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Playwright Tests: ${{ needs.playwright-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "**Deployed URL:** ${{ needs.deploy.outputs.service-url }}" >> $GITHUB_STEP_SUMMARY
          fi
